<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiosk Panda</title>
<link rel="stylesheet" href="/static/icons.css?v=__V__">
<link rel="stylesheet" href="/static/panda.css?v=__V__">
</head>
<body class="fullscreen">
  <div class="stage" id="stage">
    <div class="kiosk">
      <div class="strip">
        <div class="clock"><span class="t" id="clk">--:--</span><span class="d" id="date">—</span></div>
        <div class="wx" id="wxBar">🌤️ <span class="deg">–</span></div>
        <div id="agBar" style="display:none"></div>
        <div id="tmBar" style="display:none"></div>
        <div id="muBar" style="display:none"></div>
        <div id="rdBar"></div>
        <div class="spacer"></div>
        <div class="pill" id="connIcons" style="display:none;gap:10px"></div>
        <button class="iconbtn" id="volBtn" title="Volume" style="display:none"></button>
        <div class="pill" id="fleetPill" style="display:none"></div>
        <button class="iconbtn" id="gear" title="Paramètres">⚙<span class="badge" id="gearBadge" style="display:none"></span></button>
        <button class="iconbtn" id="logout" title="Se déconnecter"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
      </div>

      <div class="home" id="home"></div>

      <div class="ov" id="addonView">
        <div class="obar"><button class="back" id="backBtn">← Accueil</button><span class="otitle" id="ovTitle"></span><span class="osrc" id="ovSrc"></span></div>
        <div class="obody" id="ovBody"></div>
      </div>

      <div class="ov" id="settings">
        <div class="obar"><button class="back" id="closeSet">← Accueil</button><span class="otitle">Paramètres</span></div>
        <div class="setwrap">
          <nav class="setnav" id="setnav"></nav>
          <div class="setcontent" id="setcontent"></div>
        </div>
      </div>

      <div class="ov" id="cfgView">
        <div class="obar"><button class="back" id="cfgBack">← Paramètres</button><span class="otitle" id="cfgTitle"></span></div>
        <div class="obody" id="cfgBody"></div>
      </div>

      <div class="ov show" id="lock">
        <div class="lockbox">
          <div class="brand">Panda</div>
          <div class="ask" id="lockAsk">Entrez votre code</div>
          <div class="dots" id="dots"></div>
          <div class="keypad" id="keypad"></div>
          <div class="lockhint" id="lockHint">6 chiffres</div>
        </div>
      </div>

      <div class="toast" id="toast"></div>
    </div>
  </div>

<script src="/static/panda-icons.js"></script>
<script src="/static/panda.js?v=__V__"></script>
</body>
</html>
